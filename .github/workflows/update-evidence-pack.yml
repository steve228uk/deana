name: Update evidence pack

on:
  schedule:
    - cron: "15 6 1 * *"
  workflow_dispatch:
    inputs:
      force_refresh:
        description: 'Force re-download of all cached evidence sources'
        type: boolean
        default: false
      pack_version:
        description: 'Optional evidence pack version override, e.g. 2026-05-core-4'
        type: string
        default: ''

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: update-evidence-pack
  cancel-in-progress: false

jobs:
  update-evidence-pack:
    name: Update evidence pack
    runs-on: ubuntu-latest
    environment: Evidence Packs
    env:
      GWAS_ASSOCIATIONS_URL: ${{ vars.GWAS_ASSOCIATIONS_URL }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set cache month
        run: echo "CACHE_MONTH=$(date +'%Y-%m')" >> "$GITHUB_ENV"

      - name: Cache Bun packages
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-install-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            bun-install-${{ runner.os }}-

      - name: Cache evidence sources
        uses: actions/cache@v4
        with:
          path: |
            .evidence-cache/clinvar
            .evidence-cache/gwas
            .evidence-cache/snpedia
            .evidence-cache/pharmgkb
            .evidence-cache/clingen
          key: evidence-sources-${{ runner.os }}-${{ env.CACHE_MONTH }}
          restore-keys: |
            evidence-sources-${{ runner.os }}-

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install variant tools
        run: |
          sudo apt-get update
          sudo apt-get install -y bcftools tabix

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Resolve evidence pack version
        env:
          PACK_VERSION_INPUT: ${{ inputs.pack_version || '' }}
        run: |
          PACK_VERSION="$(printf '%s' "$PACK_VERSION_INPUT" | sed -e 's/^[[:space:]]*//' -e 's/[[:space:]]*$//')"
          if [ "$PACK_VERSION" != "$PACK_VERSION_INPUT" ]; then
            echo "Invalid pack_version: leading or trailing whitespace is not allowed." >&2
            exit 1
          fi

          if [ -z "$PACK_VERSION" ]; then
            echo "EVIDENCE_PACK_VERSION_ARG=" >> "$GITHUB_ENV"
            echo "Using default evidence pack version."
            exit 0
          fi

          if ! printf '%s' "$PACK_VERSION" | grep -Eq '^[0-9]{4}-[0-9]{2}-core(-[0-9]+)?$'; then
            echo "Invalid pack_version: $PACK_VERSION" >&2
            echo "Expected YYYY-MM-core or YYYY-MM-core-N, for example 2026-05-core-4." >&2
            exit 1
          fi

          echo "EVIDENCE_PACK_VERSION_ARG=--version=$PACK_VERSION" >> "$GITHUB_ENV"
          echo "Using evidence pack version override: $PACK_VERSION"

      - name: Update evidence pack
        run: |
          FORCE="${{ inputs.force_refresh && '--force' || '' }}"
          bun run scripts/syncEvidenceSources.ts $FORCE
          bun run scripts/syncCpic.ts $FORCE
          bun run scripts/syncSnpedia.ts $FORCE
          bun run scripts/syncDbsnp.ts $FORCE
          bun run scripts/syncPharmgkb.ts $FORCE
          bun run scripts/importClinGen.ts $FORCE
          bun run scripts/buildEvidencePack.ts $EVIDENCE_PACK_VERSION_ARG

      - name: Check evidence pack
        run: bun run scripts/buildEvidencePack.ts --check $EVIDENCE_PACK_VERSION_ARG

      - name: Run tests
        run: bun run test
        env:
          NODE_OPTIONS: --max-old-space-size=6144

      - name: Build
        run: bun run build
        env:
          NODE_OPTIONS: --max-old-space-size=6144

      - name: Open pull request
        uses: peter-evans/create-pull-request@v6
        with:
          branch: automation/update-evidence-pack
          delete-branch: true
          title: ${{ inputs.pack_version && format('Update evidence pack {0}', inputs.pack_version) || 'Update monthly evidence pack' }}
          commit-message: ${{ inputs.pack_version && format('Update evidence pack {0}', inputs.pack_version) || 'Update monthly evidence pack' }}
          body: |
            ## Summary
            - Syncs public evidence source caches.
            - Syncs SNPedia-derived supplementary evidence.
            - Syncs GRCh37 and GRCh38 dbSNP references for local VCF annotation.
            - Rebuilds the sharded static evidence pack.
            - Updates evidence-pack manifests, shard and annotation checksums, and app pack-version constants when needed.
            - Evidence pack version: `${{ inputs.pack_version || 'default monthly version' }}`.

            GWAS sync uses the repository `GWAS_ASSOCIATIONS_URL` variable when it is configured. If the variable is empty, the GWAS source sync step is skipped by the evidence tooling.

            ## Checks
            - `bun run scripts/buildEvidencePack.ts${{ inputs.pack_version && format(' --version={0}', inputs.pack_version) || '' }}`
            - `bun run scripts/buildEvidencePack.ts --check${{ inputs.pack_version && format(' --version={0}', inputs.pack_version) || '' }}`
            - `bun run test`
            - `bun run build`
